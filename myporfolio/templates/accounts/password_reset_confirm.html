{% extends 'base.html' %}
{% block title %}Set New Password | Portfolio{% endblock %}
{% block content %}
<section class="section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0 p-4">
                    <h2 class="section-title">Set New Password</h2>
                    <form method="post">{% csrf_token %}
                        {{ form.new_password1.label_tag }}
                        {{ form.new_password1 }}
                        {{ form.new_password2.label_tag }}
                        {{ form.new_password2 }}
                        <button class="btn btn-primary btn-lg mt-3" type="submit">Set password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
